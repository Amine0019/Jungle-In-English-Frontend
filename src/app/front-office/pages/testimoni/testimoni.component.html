<div class="w-full py-16">
  
  <h3 class="text-3xl font-medium text-center mb-12">
    Trusted by Thousands of Happy Customer
  </h3>

  <!-- Swiper Container -->
  <swiper-container 
    #swiperContainer
    init="false"
    class="pb-20"
  >
    <swiper-slide *ngFor="let testimonial of listTestimoni; let i = index">
      <div class="px-3 h-full">
        <div class="border-2 border-gray-500 hover:border-orange-500 transition-all rounded-lg p-8 h-full flex flex-col">
          
          <!-- Header: Photo, Name, Rating -->
          <div class="flex flex-col xl:flex-row w-full items-stretch xl:items-center mb-5">
            
            <!-- User Info -->
            <div class="flex order-2 xl:order-1">
              <img 
                [src]="testimonial.image" 
                [alt]="testimonial.name"
                class="h-12 w-12 rounded-full object-cover"
              />
              <div class="flex flex-col ml-5 text-left">
                <p class="text-lg text-gray-800 font-semibold capitalize">
                  {{ testimonial.name }}
                </p>
                <p class="text-sm text-gray-500 capitalize">
                  {{ testimonial.city }}, {{ testimonial.country }}
                </p>
              </div>
            </div>

            <!-- Rating -->
            <div class="flex items-center ml-auto order-1 xl:order-2 mb-4 xl:mb-0">
              <p class="text-sm font-semibold mr-2">{{ testimonial.rating }}</p>
              <span class="text-yellow-500 text-xl">⭐</span>
            </div>
            
          </div>

          <!-- Testimonial Text -->
          <p class="text-left text-gray-600 leading-relaxed">
            "{{ testimonial.testimoni }}"
          </p>
          
        </div>
      </div>
    </swiper-slide>
  </swiper-container>

  <!-- Navigation Buttons -->
  <div class="flex w-full items-center justify-end mt-8">
    <div class="flex gap-4">
      
      <!-- Previous Button -->
      <button
        (click)="goToPrevSlide()"
        class="flex items-center justify-center h-14 w-14 rounded-full bg-white border-2 border-orange-500 text-orange-500 hover:bg-orange-500 hover:text-white transition-all cursor-pointer shadow-md hover:shadow-lg"
        aria-label="Previous slide"
      >
        <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
      </button>

      <!-- Next Button -->
      <button
        (click)="goToNextSlide()"
        class="flex items-center justify-center h-14 w-14 rounded-full bg-white border-2 border-orange-500 text-orange-500 hover:bg-orange-500 hover:text-white transition-all cursor-pointer shadow-md hover:shadow-lg"
        aria-label="Next slide"
      >
        <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
        </svg>
      </button>
      
    </div>
  </div>

</div>
