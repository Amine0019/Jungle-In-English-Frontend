<div class="auth-page">
  <div class="auth-card">
    <h1>Login</h1>
    <p class="auth-card__hint">Sign in with your email and password.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
      <div class="form__group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="vous@exemple.com" autocomplete="email" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="form__error">Invalid email.</span>
        }
      </div>
      <div class="form__group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="form__error">Password is required.</span>
        }
      </div>
      <button type="submit" class="btn btn--primary btn--block" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-card__footer">
      Don't have an account? <a routerLink="/signup">Sign Up</a>
    </p>
  </div>
</div>
