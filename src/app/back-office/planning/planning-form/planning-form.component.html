<div class="planning-form-container">

    <!-- Header -->
    <div class="form-header">
        <div class="header-left">
            <button class="back-btn" type="button" (click)="goBack()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h1 class="page-title">
                {{ isEditMode ? 'Modifier le planning' : 'Créer un nouveau planning' }}
            </h1>
        </div>
    </div>

    <!-- Messages -->
    <div class="message error-message" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
    </div>
    <div class="message success-message" *ngIf="successMessage">
        ✅ {{ successMessage }}
    </div>

    <!-- Formulaire -->
    <div class="form-card" *ngIf="!isLoading">
        <form (ngSubmit)="onSubmit()">

            <!-- Titre -->
            <div class="form-group full-width">
                <label for="titre">Titre <span class="required">*</span></label>
                <input type="text" id="titre"
                       [(ngModel)]="titre"
                       name="titre"
                       placeholder="Ex: Cours d'anglais débutant"
                       required>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="datePlanning">Date <span class="required">*</span></label>
                <input type="date" id="datePlanning"
                       [(ngModel)]="datePlanning"
                       name="datePlanning"
                       required>
            </div>

            <!-- Type + Statut -->
            <div class="form-row">
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" [(ngModel)]="selectedType" name="type">
                        <option *ngFor="let t of types" [value]="t">{{ t }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="statut">Statut</label>
                    <select id="statut" [(ngModel)]="selectedStatut" name="statut">
                        <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
                    </select>
                </div>
            </div>

            <!-- Salle (obligatoire) -->
            <div class="form-group full-width">
                <label for="salle">Salle <span class="required">*</span></label>
                <select id="salle"
                        [(ngModel)]="selectedSalleId"
                        name="salle"
                        required>
                    <option [ngValue]="null" disabled>-- Choisir une salle --</option>
                    <option *ngFor="let s of salles" [ngValue]="s.id">
                        {{ s.nom_salle }} (capacité: {{ s.capacite }})
                    </option>
                </select>
            </div>

            <!-- Créneau (optionnel) -->
            <div class="form-group full-width">
                <label for="creneau">Créneau horaire</label>
                <select id="creneau"
                        [(ngModel)]="selectedCreneauId"
                        name="creneau">
                    <option [ngValue]="null">-- Aucun créneau --</option>
                    <option *ngFor="let c of creneaux" [ngValue]="c.idCreneauHoraire">
                        {{ c.jourSemaine }} | {{ c.heureDebut }} - {{ c.heureFin }} ({{ c.type }})
                    </option>
                </select>
            </div>

            <!-- Description -->
            <div class="form-group full-width">
                <label for="description">Description</label>
                <textarea id="description"
                          [(ngModel)]="description"
                          name="description"
                          rows="4"
                          placeholder="Détails de l'événement...">
                </textarea>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <button type="button" class="btn-secondary" (click)="goBack()">
                    Annuler
                </button>
                <button type="submit" class="btn-primary" [disabled]="isLoading">
                    {{ isEditMode ? 'Mettre à jour' : 'Créer le planning' }}
                </button>
            </div>

        </form>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" *ngIf="isLoading">
        <div class="spinner"></div>
        <p>Traitement en cours...</p>
    </div>

</div>
