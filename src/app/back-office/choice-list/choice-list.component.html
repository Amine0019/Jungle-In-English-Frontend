<div class="space-y-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button (click)="goBack()" class="p-2 hover:bg-gray-100 rounded-lg transition-all">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
        <span class="material-symbols-outlined text-[#0ea37a]">tune</span>
        Choices for Question #{{ questionId }}
      </h1>
    </div>
    <button (click)="addChoice()"
      class="flex items-center gap-2 px-4 py-2 bg-[#0ea37a] text-white rounded-lg hover:bg-[#0b8a68] transition-all">
      <span class="material-symbols-outlined text-xl">add</span>
      New Choice
    </button>
  </div>

  <!-- Empty state -->
  <div *ngIf="choices.length === 0" class="text-center py-16 text-gray-400">
    <span class="material-symbols-outlined text-5xl mb-4 block">rule</span>
    <p class="text-lg">No choices for this question</p>
  </div>

  <!-- Choices list -->
  <div class="space-y-3">
    <div *ngFor="let choice of choices"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition-shadow flex items-center justify-between"
      [ngClass]="{ 'border-l-4 border-l-green-500': choice.isCorrect }">
      <div class="flex items-center gap-3">
        <span *ngIf="choice.isCorrect"
          class="flex items-center justify-center w-6 h-6 bg-green-100 text-green-600 rounded-full">
          <span class="material-symbols-outlined text-sm">check</span>
        </span>
        <span *ngIf="!choice.isCorrect"
          class="flex items-center justify-center w-6 h-6 bg-gray-100 text-gray-400 rounded-full">
          <span class="material-symbols-outlined text-sm">close</span>
        </span>
        <span class="text-gray-800">{{ choice.content }}</span>
      </div>
      <div class="flex items-center gap-1">
        <button (click)="editChoice(choice.id!)"
          class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-all">
          <span class="material-symbols-outlined text-xl">edit</span>
        </button>
        <button (click)="deleteChoice(choice.id!)"
          class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-all">
          <span class="material-symbols-outlined text-xl">delete</span>
        </button>
      </div>
    </div>
  </div>
</div>
