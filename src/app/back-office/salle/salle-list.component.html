<div class="container">
  <!-- Header Section -->
  <div class="header">
    <div class="header-content">
      <h2 class="page-title">
        <svg class="title-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        Liste des salles
      </h2>
      <button class="btn-primary" routerLink="/admin/salle/add">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Ajouter une salle
      </button>
    </div>
  </div>

  <!-- Table Section -->
  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Capacité</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let salle of salles">
          <td>{{ salle.nom_salle }}</td>
          <td>{{ salle.capacite }}</td>
          <td class="actions">
            <button (click)="editSalle(salle)">Modifier</button>
            <button (click)="deleteSalle(salle.id)">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="errorMessage" class="message error-message">{{ errorMessage }}</div>
</div>
