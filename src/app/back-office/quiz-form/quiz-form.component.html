<div class="max-w-2xl mx-auto space-y-6">
  <!-- Header -->
  <div class="flex items-center gap-3">
    <button (click)="cancel()" class="p-2 hover:bg-gray-100 rounded-lg transition-all">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
      <span class="material-symbols-outlined text-[#0ea37a]">{{ isEdit ? 'edit_note' : 'note_add' }}</span>
      {{ isEdit ? 'Edit Quiz' : 'New Quiz' }}
    </h1>
  </div>

  <!-- Form card -->
  <form [formGroup]="quizForm" (ngSubmit)="onSubmit()" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5">

    <!-- Title -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
      <input formControlName="title" type="text" placeholder="Quiz title"
        class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-[#0ea37a]/30 focus:border-[#0ea37a] outline-none transition-all"
        [ngClass]="serverErrors['title'] ? 'border-red-400' : 'border-gray-200'" />
      <p *ngIf="serverErrors['title']" class="mt-1 text-sm text-red-500 flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">error</span>
        {{ serverErrors['title'] }}
      </p>
    </div>

    <!-- Description -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea formControlName="description" rows="3" placeholder="Quiz description"
        class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-[#0ea37a]/30 focus:border-[#0ea37a] outline-none transition-all resize-none"
        [ngClass]="serverErrors['description'] ? 'border-red-400' : 'border-gray-200'"></textarea>
      <p *ngIf="serverErrors['description']" class="mt-1 text-sm text-red-500 flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">error</span>
        {{ serverErrors['description'] }}
      </p>
    </div>

    <!-- Duration + Status -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Duration (min)</label>
        <input formControlName="duration" type="number" min="1"
          class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-[#0ea37a]/30 focus:border-[#0ea37a] outline-none transition-all"
          [ngClass]="serverErrors['duration'] ? 'border-red-400' : 'border-gray-200'" />
        <p *ngIf="serverErrors['duration']" class="mt-1 text-sm text-red-500 flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">error</span>
          {{ serverErrors['duration'] }}
        </p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select formControlName="status"
          class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-[#0ea37a]/30 focus:border-[#0ea37a] outline-none transition-all bg-white"
          [ngClass]="serverErrors['status'] ? 'border-red-400' : 'border-gray-200'">
          <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
        </select>
        <p *ngIf="serverErrors['status']" class="mt-1 text-sm text-red-500 flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">error</span>
          {{ serverErrors['status'] }}
        </p>
      </div>
    </div>

    <!-- TeacherId + CourseId -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Teacher ID</label>
        <input formControlName="teacherId" type="number"
          class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#0ea37a]/30 focus:border-[#0ea37a] outline-none transition-all" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Course ID</label>
        <input formControlName="courseId" type="number"
          class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#0ea37a]/30 focus:border-[#0ea37a] outline-none transition-all" />
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3 pt-4 border-t border-gray-100">
      <button type="submit" [disabled]="submitting"
        class="flex items-center gap-2 px-6 py-2.5 bg-[#0ea37a] text-white rounded-lg hover:bg-[#0b8a68] transition-all disabled:opacity-50 disabled:cursor-not-allowed font-medium">
        <span class="material-symbols-outlined text-xl">{{ isEdit ? 'save' : 'add_circle' }}</span>
        {{ isEdit ? 'Save' : 'Create' }}
      </button>
      <button type="button" (click)="cancel()"
        class="flex items-center gap-2 px-6 py-2.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-all font-medium">
        <span class="material-symbols-outlined text-xl">close</span>
        Cancel
      </button>
    </div>
  </form>
</div>
